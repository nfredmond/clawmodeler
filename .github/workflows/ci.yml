name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[visuals,pdf]" ruff

      - name: Ruff check
        run: ruff check clawmodeler_engine/ tests/

      - name: Engine tests
        run: python -m unittest discover -s tests -p '*test*.py'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Release workflow audit
        run: pnpm release:workflow:test

      - name: First-user release smoke
        run: pnpm release:first-user-smoke

      - name: Install desktop deps
        run: pnpm install --frozen-lockfile
        working-directory: desktop

      - name: Desktop type check
        run: pnpm typecheck
        working-directory: desktop

      - name: Desktop tests
        run: pnpm test
        working-directory: desktop
